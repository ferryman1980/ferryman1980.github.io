<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="2;url=http://localhost:3000`，输入目标URL即可开始克隆。">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在跳转...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; margin: 0;
            background: #0d1117; color: #c9d1d9;
        }
        .box {
            text-align: center; padding: 40px; border-radius: 12px;
            background: #161b22; border: 1px solid #30363d;
            max-width: 420px; width: 90%;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid #30363d;
            border-top-color: #58a6ff; border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        a { color: #58a6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .url {
            font-size: 12px; color: #8b949e;
            word-break: break-all; margin-top: 10px;
        }
        .note {
            font-size: 11px; color: #6e7681; margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="spinner"></div>
        <p>正在跳转至目标页面...</p>
        <p class="url">http://localhost:3000`，输入目标URL即可开始克隆。</p>
        <p class="note">
            如果未自动跳转，请 <a href="http://localhost:3000`，输入目标URL即可开始克隆。">点击这里</a>
        </p>
    </div>
    <!-- 点击追踪像素 (hits.sh) -->
    <img src="https://hits.sh/ferryman1980.github.io/r/b5c9a2.svg" alt="" width="1" height="1"
         style="position:absolute;opacity:0;">
    <script>
        setTimeout(() => { window.location.href = "http://localhost:3000`，输入目标URL即可开始克隆。"; }, 1200);
    </script>
</body>
</html>
